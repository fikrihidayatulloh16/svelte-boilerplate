<!-- apps/svelte5/src/app.html -->
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- <link rel="icon" href="%svelte.assets%/favicon.png" /> -->
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%

		<style>
            #initial-loader {
                position: fixed; inset: 0; z-index: 99999;
                display: flex; align-items: center; justify-content: center;
                background-color: white; transition: opacity 0.3s ease;
            }
            .spinner {
                width: 40px; height: 40px;
                border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; /* Biru Tailwind */
                border-radius: 50%; animation: spin 1s linear infinite;
            }
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>

		<script nonce="%sveltekit.nonce%">
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        </script>
	</head>

	<body 
		data-sveltekit-preload-data="hover"
		class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-950 dark:text-gray-100"
	>

		<div id="initial-loader">
            <div class="spinner"></div>
        </div>

		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
